spring:
  application:
    name: hrms-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/hrms
    username: hrms
    password: hrms
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

server:
  port: 8080

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# JWT (use env JWT_SECRET in production; must be at least 256 bits for HS256)
app:
  jwt:
    secret: ${JWT_SECRET:hrms-dev-secret-key-at-least-32-chars-long-for-hs256}
    access-token-validity-minutes: 15
    refresh-token-validity-days: 7
