spring:
  application:
    name: hrms-backend
  mail:
    host: ${HRMS_SMTP_HOST:}
    port: ${HRMS_SMTP_PORT:587}
    username: ${HRMS_SMTP_USER:}
    password: ${HRMS_SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: ${HRMS_SMTP_AUTH:true}
          starttls:
            enable: ${HRMS_SMTP_STARTTLS:true}
  datasource:
    url: jdbc:postgresql://localhost:5432/hrms
    username: hrms
    password: hrms
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# If startup fails with webServerStartStop / Tomcat: port is likely in use — set SERVER_PORT=8081 or stop the other process
server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Offer letter PDF: place your letterhead file as src/main/resources/templates/offer-letter-template.pdf
# Or set HRMS_OFFER_PDF_TEMPLATE_FILE to an absolute path (overrides classpath).
hrms:
  employee:
    # Initial password for auto-created login when an employee record is added (change in production).
    default-password: ${HRMS_EMPLOYEE_DEFAULT_PASSWORD:password}
  offer:
    pdf-template: classpath:/templates/offer-letter-template.pdf
    pdf-template-file: ${HRMS_OFFER_PDF_TEMPLATE_FILE:}
    body-start-y: 620
    body-margin-x: 50
    body-min-y: 72
    body-line-height: 12
    wrap-chars: 85
  email:
    from: ${HRMS_EMAIL_FROM:no-reply@example.com}
    reply-to: ${HRMS_EMAIL_REPLY_TO:}
    offer-subject: ${HRMS_OFFER_EMAIL_SUBJECT:Your Offer Letter}

# JWT (use env JWT_SECRET in production; must be at least 256 bits for HS256)
app:
  jwt:
    secret: ${JWT_SECRET:hrms-dev-secret-key-at-least-32-chars-long-for-hs256}
    access-token-validity-minutes: 15
    refresh-token-validity-days: 7
